<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Aithera — Adaptive Learning</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23ff7a3d%22/><text x=%2232%22 y=%2243%22 font-size=%2236%22 font-family=%22sans-serif%22 font-weight=%22700%22 text-anchor=%22middle%22 fill=%22white%22>A</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- App root. Views render into #view; the persistent shell wraps it. -->
  <div id="app" class="app">
    <!-- Top app bar (hidden on launch) -->
    <header id="appbar" class="appbar" hidden>
      <button class="iconbtn" id="backBtn" aria-label="Back">‹</button>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Aithera</span>
      </div>
      <button class="iconbtn" id="profileBtn" aria-label="Profile">◐</button>
    </header>

    <main id="view" class="view"></main>

    <!-- Bottom nav (hidden on launch) -->
    <nav id="tabbar" class="tabbar" hidden>
      <a data-route="#/home" class="tab"><span>Home</span></a>
      <a data-route="#/hub" class="tab"><span>Practice</span></a>
      <a data-route="#/coach" class="tab tab-coach"><span>Coach Vic</span></a>
      <a data-route="#/profile" class="tab"><span>Me</span></a>
    </nav>

    <!-- Persistent Coach Vic FAB -->
    <button id="coachFab" class="coach-fab" hidden aria-label="Open Coach Vic">
      <span class="coach-dot"></span>Vic
    </button>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    // Register service worker for PWA / offline. Path is relative so it works
    // under a GitHub Pages project subpath (/aithera/).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
