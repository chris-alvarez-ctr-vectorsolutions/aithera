<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0b1220" />
  <title>Aithera — Adaptive Learning</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 rx=%2214%22 fill=%22%23ff7a3d%22/><text x=%2232%22 y=%2243%22 font-size=%2236%22 font-family=%22sans-serif%22 font-weight=%22700%22 text-anchor=%22middle%22 fill=%22white%22>A</text></svg>" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <!-- App root. Views render into #view; the persistent shell wraps it. -->
  <div id="app" class="app">
    <!-- Home-only app bar: brand + profile button. Hidden on every other route. -->
    <header id="appbar" class="appbar" hidden>
      <div class="brand">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-name">Aithera</span>
      </div>
      <button class="iconbtn" id="profileBtn" aria-label="Profile">◐</button>
    </header>

    <!-- Floating back button on shelled non-home pages -->
    <button id="backBtn" class="floatbtn floatbtn-left" aria-label="Back" hidden>‹</button>

    <!-- Fullscreen exit (only visible on fullscreen routes like Practice) -->
    <button id="exitBtn" class="floatbtn floatbtn-right" aria-label="Exit practice" hidden>×</button>

    <main id="view" class="view"></main>

    <!-- Bottom nav (hidden on Launch screen) -->
    <nav id="tabbar" class="tabbar" hidden>
      <a data-route="#/home"      class="tab"><i class="ico ico-home"   aria-hidden="true"></i><span>Home</span></a>
      <a data-route="#/courses"   class="tab"><i class="ico ico-courses"aria-hidden="true"></i><span>Courses</span></a>
      <a data-route="#/coach"     class="tab tab-coach"><i class="ico ico-coach" aria-hidden="true"></i><span>Coach Vic</span></a>
      <a data-route="#/practice"  class="tab"><i class="ico ico-pract"  aria-hidden="true"></i><span>Practice</span></a>
      <a data-route="#/reference" class="tab"><i class="ico ico-ref"    aria-hidden="true"></i><span>Reference</span></a>
    </nav>
  </div>

  <script type="module" src="js/app.js"></script>
  <script>
    // Register service worker and auto-reload when a new version takes over.
    // Without this, an old SW keeps serving stale assets until the user
    // hard-refreshes — which isn't obvious to a non-dev tester.
    if ('serviceWorker' in navigator) {
      let didReload = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (didReload) return;
        didReload = true;
        window.location.reload();
      });
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').then((reg) => {
          // Poll for updates each visit. If a new SW is found, install it
          // and let it take over (skipWaiting in the SW activates it
          // immediately, which fires controllerchange above → reload).
          reg.update?.();
          reg.addEventListener('updatefound', () => {
            const sw = reg.installing;
            if (!sw) return;
            sw.addEventListener('statechange', () => {
              // Only auto-reload when there was already a controller
              // (i.e. this is an upgrade, not the first install).
              if (sw.state === 'installed' && navigator.serviceWorker.controller) {
                sw.postMessage({ type: 'SKIP_WAITING' });
              }
            });
          });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
